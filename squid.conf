# Minimal domain-filtering forward proxy for the claude-isolated sandbox.
#
# The agent (uid 1000) has NO external network and NO external DNS — iptables
# only lets the 'proxy' uid out (see entrypoint.sh). Every request the agent
# makes therefore has to come through here, and this config only forwards to
# hostnames present in /etc/squid/allowlist.txt. Everything else is denied.
# Fails closed: if squid is down, the agent simply has no path to the internet.

# --- The allowlist -----------------------------------------------------------
# dstdomain matches the request's Host / CONNECT target against the file. An
# entry beginning with a dot (".npmjs.org") matches the domain and all
# subdomains; a bare entry ("pypi.org") matches that exact host only.
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# --- Ports -------------------------------------------------------------------
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Block anything that isn't plain HTTP(S), and only allow CONNECT (the tunnel
# used for HTTPS) to 443 — so the proxy can't be turned into a generic TCP relay.
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow allowlisted destinations; deny everything else. Order matters.
http_access allow allowed_domains
http_access deny all

# --- Listener ----------------------------------------------------------------
# Loopback only: the agent reaches us at 127.0.0.1:3128 and nothing else can.
http_port 127.0.0.1:3128

# --- Run as the 'proxy' user -------------------------------------------------
# CRITICAL: the egress firewall only lets the 'proxy' uid reach the network
# (iptables --uid-owner proxy). Replacing Debian's default config dropped its
# cache_effective_user, so set it explicitly — squid workers MUST be 'proxy' or
# all outbound traffic is dropped and the proxy is useless.
cache_effective_user proxy
cache_effective_group proxy

# Squid resolves its own FQDN at startup; with no external DNS that can FATAL.
# Pin a name so it always starts.
visible_hostname claude-isolated

# --- No caching --------------------------------------------------------------
# Don't persist anyone's responses (could hold credentials/tokens) and keep the
# footprint tmpfs-friendly: memory only, no on-disk cache_dir, no swap to init.
cache deny all
cache_mem 16 MB
maximum_object_size_in_memory 0 KB

# --- Logging -----------------------------------------------------------------
# Send logs to stdout/stderr so `docker logs` shows allow/deny decisions; an
# unexpected egress denial is then visible without exec-ing into the container.
access_log stdio:/dev/stdout squid
cache_log stdio:/dev/stderr
pid_filename /run/squid.pid

# Trim noise and don't leak the container's identity to upstreams.
forwarded_for delete
via off
httpd_suppress_version_string on

# Shut down promptly when the container stops.
shutdown_lifetime 1 second
